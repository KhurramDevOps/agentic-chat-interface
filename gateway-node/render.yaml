services:
  - type: web
    name: nexus-node-gateway
    runtime: node
    rootDir: gateway-node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_API_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
